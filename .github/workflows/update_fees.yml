name: Update USCIS Fees

on:
  # Run every Sunday at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * 0'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fee scraper
        id: scraper
        run: python .github/workflows/scraper.py

      - name: Commit updated fees.json
        if: steps.scraper.outputs.changed == 'true'
        run: |
          git config user.name  "ImmiFlight Bot"
          git config user.email "immiflight-bot@users.noreply.github.com"
          git add data/fees.json
          git commit -m "[bot] fee update $(date +'%Y-%m-%d')"
          git push

      - name: No changes — skip commit
        if: steps.scraper.outputs.changed == 'false'
        run: echo "No fee changes this week. fees.json not modified."
